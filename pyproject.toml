[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "udemy-dl"
version = "2.1.0"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"
dependencies = [
    "requests>=2.31.0",
    "windows-curses; platform_system == 'Windows'"
]

[project.scripts]
udemy-dl = "src.main:run"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
